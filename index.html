<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overlap — a shareable team clock</title>
  <meta name="description" content="See your whole distributed team on one timeline that fits your screen. No login, no server — the workspace lives in the URL." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>◷</text></svg>" />
</head>
<body>
  <!-- ───────────────────────── Top bar ───────────────────────── -->
  <header class="topbar">
    <div class="brand">
      <span class="mark">◷</span>
      <div class="ws">
        <span class="ws-eyebrow">Workspace</span>
        <input id="org" class="org" placeholder="Name your team…" maxlength="40" aria-label="Workspace name" />
      </div>
    </div>
    <div class="topbar-right">
      <span id="urlBadge" class="url-badge" title="Length of the shareable URL. Stay under ~2000 chars."></span>
      <button id="shareBtn" class="btn primary">Share link</button>
    </div>
  </header>

  <main class="app">
    <!-- ───────────────────────── Stage: the timeline ───────────────────────── -->
    <section class="card stage">
      <!-- compact controls: timezone · date · zoom · format · block -->
      <div class="controls">
        <div class="combo" id="homeCombo">
          <span class="combo-icon">🌍</span>
          <input id="homeTz" class="combo-input" placeholder="Show times in… (city or country)" autocomplete="off" aria-label="Reference timezone" />
          <ul id="homeTzList" class="combo-list" hidden></ul>
        </div>
        <div class="ctrl-group date-nav">
          <button id="prevDay" class="btn ghost icon-btn" title="Previous day">‹</button>
          <input id="datePick" type="date" aria-label="Date" />
          <button id="nextDay" class="btn ghost icon-btn" title="Next day">›</button>
          <button id="todayBtn" class="btn ghost sm">Today</button>
        </div>
        <span id="dateLabel" class="date-pretty"></span>
        <span class="spacer"></span>
        <div class="ctrl-group zoom">
          <button id="zoomOut" class="btn ghost icon-btn" title="Zoom out">−</button>
          <button id="fitBtn" class="btn ghost sm" title="Fit the whole day to the screen">Fit</button>
          <button id="zoomIn" class="btn ghost icon-btn" title="Zoom in">+</button>
        </div>
        <label class="switch" title="12-hour clock"><input id="fmt12" type="checkbox" /><span>AM/PM</span></label>
        <button id="blockBtn" class="btn primary sm" title="Block a time / create a meeting">＋ Block time</button>
      </div>

      <!-- team filters double as the planner scope -->
      <div class="filters">
        <span class="filters-label">Show</span>
        <div id="teamFilter" class="team-filter"></div>
        <span id="scrubReadout" class="scrub-readout"></span>
      </div>

      <!-- scrollable, hover-readable timeline -->
      <div id="board" class="board">
        <div id="boardInner" class="board-inner">
          <div class="tl-row axis">
            <div class="tl-label axis-label">Teammate</div>
            <div id="axisTrack" class="tl-track axis-track"></div>
          </div>
          <div id="lanes"></div>
          <div id="nowMarker" class="marker now" title="Now"><span>now</span></div>
          <div id="scrubber" class="marker scrub" tabindex="0" aria-label="Time scrubber"></div>
          <div id="hoverTip" class="hover-tip" hidden></div>
        </div>
      </div>

      <!-- meeting planner -->
      <div class="planner-strip">
        <div class="planner-head">
          <div>
            <h2>Find a time</h2>
            <p class="muted small">When <b id="plannerScopeName">everyone</b> overlaps — pick a slot to schedule.</p>
          </div>
          <select id="duration" class="mini-select" aria-label="Meeting length">
            <option value="30">30 min</option>
            <option value="60" selected>1 hour</option>
            <option value="90">1.5 hours</option>
            <option value="120">2 hours</option>
          </select>
        </div>
        <div id="planner" class="planner"></div>
      </div>
    </section>

    <!-- ───────────────────────── Side rail: team + meetings ───────────────────────── -->
    <aside class="side">
      <section class="card roster-card">
        <div class="card-head">
          <h2>Team</h2>
          <div class="head-actions">
            <input id="search" class="mini-search" placeholder="Search…" aria-label="Search teammates" />
            <button id="openAdd" class="btn primary sm">＋ Person</button>
          </div>
        </div>
        <p class="muted small">Drag a person onto a team to move them.</p>
        <div id="roster" class="roster"></div>
        <button id="openTeams" class="btn ghost block">＋ Manage teams</button>
      </section>

      <section class="card meetings-card">
        <button id="toggleMeetings" class="card-head collapser" aria-expanded="true">
          <h2>Saved meetings <span id="mtgCount" class="count"></span></h2>
          <span class="muted small">on this device · <span class="chevron">▾</span></span>
        </button>
        <div id="meetings" class="meetings"></div>
      </section>
    </aside>
  </main>

  <!-- ───────────────────────── Slide-in drawer (forms live here) ───────────────────────── -->
  <div id="scrim" class="scrim" hidden></div>
  <aside id="drawer" class="drawer" hidden aria-label="Editor">
    <div class="drawer-head">
      <h3 id="drawerTitle">Add a teammate</h3>
      <button id="closeDrawer" class="btn ghost icon-btn" title="Close">✕</button>
    </div>

    <form id="memberForm" class="form" autocomplete="off">
      <label>Name
        <input id="mName" required maxlength="30" placeholder="e.g. Sriram" />
      </label>
      <label>Location / timezone
        <div class="combo" id="memberCombo">
          <input id="mTz" class="combo-input" required placeholder="Search a city or country…" autocomplete="off" />
          <ul id="mTzList" class="combo-list" hidden></ul>
        </div>
      </label>
      <div class="row-2">
        <label>Starts <input id="mStart" type="time" step="1800" value="09:00" required /></label>
        <label>Ends <input id="mEnd" type="time" step="1800" value="17:00" required /></label>
      </div>
      <label class="checkbox"><input id="mOvernight" type="checkbox" /> Overnight shift (ends next day)</label>
      <div class="days-off">
        <span class="days-off-label">Days off</span>
        <div id="mDaysOff" class="day-toggles"></div>
      </div>
      <label>Team
        <select id="mTeam"><option value="">— No team —</option></select>
      </label>
      <p id="formError" class="error" hidden></p>
      <div class="form-actions">
        <button type="submit" class="btn primary" id="saveMemberBtn">Add teammate</button>
        <button type="button" class="btn ghost" id="dummyBtn" title="Add a random teammate">🎲 Dummy</button>
        <button type="button" class="btn ghost danger" id="deleteMemberBtn" hidden>Remove</button>
      </div>
    </form>

    <div class="drawer-section">
      <h4>Sub-teams</h4>
      <form id="teamForm" class="team-form">
        <input id="teamName" maxlength="24" placeholder="New team (e.g. Marketing)" />
        <button class="btn primary" type="submit">Add</button>
      </form>
      <ul id="teamList" class="team-list"></ul>
    </div>
  </aside>

  <!-- Meeting create / edit — date, time & length editable inline -->
  <dialog id="meetingDialog" class="dialog">
    <form method="dialog" id="meetingForm">
      <h3 id="meetingDialogTitle">Block / schedule time</h3>
      <div class="row-3">
        <label>Date <input id="mtgDate" type="date" /></label>
        <label>Start <input id="mtgStart" type="time" step="900" /></label>
        <label>Length <select id="mtgDur"></select></label>
      </div>
      <p id="meetingWhen" class="muted small"></p>
      <label>Title <input id="meetingTitle" maxlength="80" placeholder="e.g. Weekly sync" /></label>
      <label>Attendees <input id="meetingAttendees" placeholder="Comma-separated names" /></label>
      <label>Minutes / notes (MOM)
        <textarea id="meetingNotes" rows="4" placeholder="Agenda, decisions, action items…"></textarea>
      </label>
      <div class="form-actions">
        <button value="save" class="btn primary">Save meeting</button>
        <button value="cancel" class="btn ghost" formnovalidate>Cancel</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" hidden></div>

  <!-- Dependencies (CDN, no build step). Order matters: libs first, then our code. -->
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script src="state.js"></script>
  <script src="tzcities.js"></script>
  <script src="timeutil.js"></script>
  <script src="store.js"></script>
  <script src="calendar.js"></script>
  <script src="app.js"></script>
</body>
</html>
